<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarea: RecepcionContexto</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f4f6f7; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn { display: inline-block; background: #2ecc71; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; border: none; cursor: pointer; }
        .btn-secondary { background: #95a5a6; }
        .btn-danger { background: #e74c3c; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 5px; margin-top: 15px; background: #fafafa; }

    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color: #7f8c8d; text-decoration: none;">&larr; Volver al Índice Principal</a>
        <h1>RecepcionContexto</h1>

            <div class="box">
                <h3>Recepción de Peticiones</h3>
                <p>Selecciona una petición de contexto pendiente para procesar:</p>
                <form action="tarea_ComprobarFormato.html">
                    <label><input type="radio" name="req" required> Petición entrante del agente emisor</label><br><br>
